<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>放心吃 - 过敏原筛选助手</title>
    <style>
        /* ===== 基础变量 ===== */
        :root {
            --td-bg-color-page: #FCFCF2;
            --td-bg-color-container: #FFFFFF;
            --td-bg-color-secondary: #F9F9E6;
            --td-text-color-primary: rgba(0,0,0,0.85);
            --td-text-color-secondary: rgba(0,0,0,0.65);
            --td-border-color: #E0E0D0;
            --td-brand-color: #E64A19;
            --td-card-radius: 20px;
            --master-btn-bg: #FFE4E1;
            --master-btn-border: #D9B8B4;
            --sub-btn-bg: #FFF5EE;
            --sub-btn-border: #E6D8CE;
            --accent-dot: #FF6347;
            --filter-bar-bg: #E8F8E8;
            --filter-bar-text: #2B5A2B;
            --title-card-bg: #FFFACD;
            --title-text: #2b4a2b;
            --subtitle-text: #5a6e3a;
            --top-bar-bg: #FFFFE0;
            --top-bar-border: #e0e0b0;
            --master-font-family: "SimSun", "宋体", "Times New Roman", serif;
            --sub-font-family: "KaiTi", "楷体", "华文楷书", cursive;
            --active-master-bg: #F08080;
            --active-sub-bg: #F08080;
        }
        /* 深色模式 */
        [data-theme="dark"] {
            --td-bg-color-page: #121212;
            --td-bg-color-container: #1E1E1E;
            --td-bg-color-secondary: #2A2A2A;
            --td-text-color-primary: #FFFFFF;
            --td-text-color-secondary: #CCCCCC;
            --td-border-color: #3A3A3A;
            --td-brand-color: #FF7A4A;
            --master-btn-bg: rgba(74, 48, 48, 0.65);
            --master-btn-border: rgba(90, 70, 70, 0.8);
            --sub-btn-bg: rgba(74, 48, 48, 0.55);
            --sub-btn-border: rgba(90, 70, 70, 0.7);
            --accent-dot: #FFA07A;
            --filter-bar-bg: #2A2A2A;
            --filter-bar-text: #FFD0B0;
            --title-card-bg: #FFFACD;
            --title-text: #2b4a2b;
            --subtitle-text: #5a6e3a;
            --top-bar-bg: #FFFFE0;
            --top-bar-border: #e0e0b0;
            --active-master-bg: rgba(240, 128, 128, 0.85);
            --active-sub-bg: rgba(240, 128, 128, 0.85);
            --tab-text-color: #FFFFFF;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--td-bg-color-page);
            color: var(--td-text-color-primary);
            transition: background 0.2s, color 0.2s;
        }
        .page {
            max-width: 540px;
            margin: 0 auto;
            padding-bottom: 40px;
        }
        /* 顶部栏 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 12px;
            background: var(--top-bar-bg);
            gap: 8px;
            border-bottom: 1px solid var(--top-bar-border);
        }
        .account-btn {
            background: #ddd8a8;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #2c2c1c;
        }
        [data-theme="dark"] .account-btn {
            background: #ddd8a8;
            color: #2c2c1c;
        }
        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .tool-btn {
            background: #ddd8a8;
            border: none;
            height: 28px;
            border-radius: 28px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            color: #2c2c1c;
        }
        [data-theme="dark"] .tool-btn {
            background: #ddd8a8;
            color: #2c2c1c;
        }
        #themeToggleBtn, #langBtn, #shareBtn {
            width: 30px;
            padding: 0;
            justify-content: center;
        }
        .lang-dropdown { position: relative; }
        .lang-menu {
            display: none;
            position: absolute;
            top: 32px;
            right: 0;
            background: var(--td-bg-color-container);
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
            min-width: 120px;
            z-index: 200;
            border: 1px solid var(--td-border-color);
        }
        .lang-menu.show { display: block; }
        .lang-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.1s;
            color: var(--td-text-color-primary);
        }
        .lang-item:hover { background: var(--td-bg-color-secondary); }
        
        .title-card {
            background: var(--title-card-bg);
            border-radius: 32px;
            margin: 18px 16px;
            padding: 20px 16px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .header-title {
            font-size: 36px;
            font-weight: 800;
            font-family: "KaiTi", "楷体", "华文楷书", serif;
            color: var(--title-text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-subtitle {
            font-size: 11px;
            color: var(--subtitle-text);
            margin-top: 6px;
        }
        .search-section { padding: 0 16px 16px; }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--td-border-color);
            background: var(--td-bg-color-container);
            color: var(--td-text-color-primary);
            font-size: 14px;
        }
        .allergen-section {
            background: var(--td-bg-color-container);
            border-radius: 24px;
            padding: 16px;
            margin: 0 16px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .section-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--td-text-color-secondary);
        }
        .color-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-dot);
            border-radius: 50%;
        }
        .allergen-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .allergen-master-btn {
            background: var(--master-btn-bg);
            border: 1.5px solid var(--master-btn-border);
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: var(--tab-text-color, var(--td-text-color-primary));
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-family: var(--master-font-family);
        }
        .allergen-master-btn.active {
            background: var(--active-master-bg);
            border-color: #E07070;
            color: #FFFFFF;
        }
        .sub-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 4px 0 12px 16px;
            padding-left: 12px;
            border-left: 3px solid #c9c18e;
        }
        [data-theme="dark"] .sub-options {
            border-left-color: #c9c18e;
        }
        .sub-option {
            background: var(--sub-btn-bg);
            border: 1px solid var(--sub-btn-border);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: var(--tab-text-color, var(--td-text-color-primary));
            font-family: var(--sub-font-family);
        }
        .sub-option.active {
            background: var(--active-sub-bg);
            border-color: #E07070;
            color: #FFFFFF;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            margin: 12px 16px;
            color: var(--td-text-color-primary);
        }
        .badge {
            background: var(--td-bg-color-secondary);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .dish-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 16px;
        }
        .dish-card {
            background: var(--td-bg-color-container);
            border-radius: var(--td-card-radius);
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1px solid transparent;
        }
        .dish-card.hidden { display: none; }
        .dish-info { flex: 1; }
        .dish-name { font-weight: 700; font-size: 16px; color: var(--td-text-color-primary); }
        .dish-restaurant { font-size: 12px; color: var(--td-text-color-secondary); margin-top: 2px; }
        .dish-price { color: var(--td-brand-color); font-weight: 700; margin-top: 4px; }
        .dish-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
        }
        .allergen-tag {
            background: #FDECEE;
            color: #C9353F;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
        }
        [data-theme="dark"] .allergen-tag {
            background: rgba(74, 48, 48, 0.85);
            color: #FFA0A0;
        }
        .filter-bar {
            background: var(--filter-bar-bg);
            margin: 0 16px 8px;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--filter-bar-text);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--td-bg-color-container);
            border-radius: 32px;
            margin: 20px;
            color: var(--td-text-color-secondary);
        }
        .footer {
            text-align: center;
            font-size: 10px;
            margin-top: 30px;
            padding: 16px;
            color: var(--td-text-color-secondary);
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        [data-theme="dark"] .toast-msg {
            background: #1A1A1A;
            color: #FFD0B0;
        }
    </style>
</head>

    <div class="footer" id="footer">食品安全提示：仅供参考，以实物为准</div>
</div>

            masterNames: { gluten:"الغلوتين", crustaceans:"القشريات", fish:"الأسماك", eggs:"البيض", peanuts:"الفول السوداني", soybeans:"فول الصويا", dairy:"مشتقات الحليب", nuts:"المكسرات" },
            masterTooltips: { gluten:"تصفية الغلوتين", crustaceans:"تصفية القشريات", fish:"", eggs:"", peanuts:"", soybeans:"", dairy:"تصفية منتجات الألبان", nuts:"تصفية المكسرات" },
            subNames: { wheat:"قمح", rye:"شَيلم", barley:"شعير", oats:"شوفان", shrimp:"جمبري", lobster:"كركند", crab:"سلطعون", cowMilk:"حليب بقر", goatMilk:"حليب ماعز", almond:"لوز", hazelnut:"بندق", walnut:"جوز", cashew:"كاجو", pistachio:"فستق" }
        }
    };

    let currentLang = 'zh';

    // 过敏原结构
    const masterAllergens = [
        { id: 'gluten', hasSub: true, subs: ['wheat','rye','barley','oats'] },
        { id: 'crustaceans', hasSub: true, subs: ['shrimp','lobster','crab'] },
        { id: 'fish', hasSub: false, subs: [] },
        { id: 'eggs', hasSub: false, subs: [] },
        { id: 'peanuts', hasSub: false, subs: [] },
        { id: 'soybeans', hasSub: false, subs: [] },
        { id: 'dairy', hasSub: true, subs: ['cowMilk','goatMilk'] },
        { id: 'nuts', hasSub: true, subs: ['almond','hazelnut','walnut','cashew','pistachio'] }
    ];
    
    let selectedSubs = new Set();
    let expandedMaster = new Set();
    let selectedSimple = new Set();

    const dishesData = [
        { name:"经典牛肉汉堡", restaurant:"美式餐厅", price:48, allergens:["wheat","dairy"] },
        { name:"鲜虾馄饨面", restaurant:"粤式茶点", price:38, allergens:["wheat","shrimp","eggs"] },
        { name:"杏仁可颂", restaurant:"法式面包房", price:22, allergens:["wheat","almond","dairy","eggs"] },
        { name:"意式海鲜烩饭", restaurant:"地中海风味", price:88, allergens:["shrimp","crab","dairy"] },
        { name:"日式照烧鸡", restaurant:"和风食堂", price:42, allergens:["soybeans"] },
        { name:"花生酱松饼", restaurant:"早午餐店", price:28, allergens:["peanuts","wheat","dairy","eggs"] },
        { name:"腰果炒鸡丁", restaurant:"亚洲小馆", price:52, allergens:["cashew","soybeans"] },
        { name:"榛子巧克力蛋糕", restaurant:"甜点工坊", price:35, allergens:["hazelnut","eggs","dairy","wheat"] },
        { name:"鲜奶蒸蛋", restaurant:"家常厨房", price:18, allergens:["eggs","dairy"] },
        { name:"清蒸鳕鱼", restaurant:"海鲜码头", price:68, allergens:["fish"] },
        { name:"龙虾浓汤", restaurant:"高级西餐厅", price:98, allergens:["lobster","dairy"] },
        { name:"全麦核桃包", restaurant:"健康烘焙", price:15, allergens:["wheat","walnut"] },
        { name:"麻婆豆腐", restaurant:"川菜馆", price:28, allergens:["soybeans"] },
        { name:"芝士焗虾", restaurant:"意式厨房", price:56, allergens:["shrimp","dairy"] },
        { name:"燕麦坚果能量棒", restaurant:"轻食主义", price:20, allergens:["oats","almond","dairy"] },
        { name:"黑麦三明治", restaurant:"德式面包房", price:32, allergens:["rye","dairy"] },
        { name:"大麦茶配饼干", restaurant:"茶餐厅", price:12, allergens:["barley","wheat"] },
        { name:"蟹肉沙拉", restaurant:"轻食集合", price:45, allergens:["crab","eggs"] },
        { name:"开心果冰淇淋", restaurant:"意式冰店", price:28, allergens:["pistachio","dairy"] },
        { name:"羊乳酪披萨", restaurant:"地中海风味", price:62, allergens:["goatMilk","wheat"] },
        { name:"牛乳布丁", restaurant:"甜品店", price:18, allergens:["cowMilk"] },
        { name:"炒花生米", restaurant:"小酒馆", price:10, allergens:["peanuts"] },
        { name:"溏心蛋拌饭", restaurant:"韩式厨房", price:25, allergens:["eggs","soybeans"] },
        { name:"杏仁豆腐", restaurant:"中式甜品", price:22, allergens:["almond","dairy"] },
        { name:"腰果脆皮鸡", restaurant:"融合菜", price:58, allergens:["cashew","soybeans"] }
    ];

    function t(key, subKey=null) {
        const dict = translations[currentLang];
        if(subKey && dict.subNames[subKey]) return dict.subNames[subKey];
        if(dict[key]) return dict[key];
        return key;
    }
    function getMasterLabel(masterId) { return translations[currentLang].masterNames[masterId] || masterId; }
    function getMasterTooltip(masterId) { return translations[currentLang].masterTooltips[masterId] || ''; }

    function renderMasterAndSubs() {
        const container = document.getElementById('allergenMasterContainer');
        container.innerHTML = '';
        masterAllergens.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'allergen-master-btn';
            btn.textContent = getMasterLabel(m.id);
            const tip = getMasterTooltip(m.id);
            if(tip) btn.title = tip;
            if(!m.hasSub) {
                if(selectedSimple.has(m.id)) btn.classList.add('active');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(selectedSimple.has(m.id)) selectedSimple.delete(m.id);
                    else selectedSimple.add(m.id);
                    renderMasterAndSubs();
                    filterDishes();
                });
            } else {
                const anyChildSelected = m.subs.some(sub => selectedSubs.has(sub));
                if(anyChildSelected) btn.classList.add('active');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(expandedMaster.has(m.id)) expandedMaster.delete(m.id);
                    else expandedMaster.add(m.id);
                    renderMasterAndSubs();
                });
            }
            container.appendChild(btn);
        });
        const subContainer = document.getElementById('subOptionContainer');
        subContainer.innerHTML = '';
        for(let m of masterAllergens) {
            if(!expandedMaster.has(m.id) || !m.hasSub) continue;
            const wrapper = document.createElement('div');
            wrapper.className = 'sub-options';
            m.subs.forEach(subId => {
                const span = document.createElement('span');
                span.className = 'sub-option';
                span.textContent = t(null, subId);
                if(selectedSubs.has(subId)) span.classList.add('active');
                span.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(selectedSubs.has(subId)) selectedSubs.delete(subId);
                    else selectedSubs.add(subId);
                    renderMasterAndSubs();
                    filterDishes();
                });
                wrapper.appendChild(span);
            });
            subContainer.appendChild(wrapper);
        }
    }

    function getActiveAllergens() {
        const active = new Set();
        for(let sub of selectedSubs) active.add(sub);
        for(let simp of selectedSimple) active.add(simp);
        return active;
    }

    function filterDishes() {
        const active = getActiveAllergens();
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        let visible = 0;
        dishesData.forEach((dish, idx) => {
            const card = document.getElementById(`dish-card-${idx}`);
            if(!card) return;
            let blocked = false;
            for(let a of dish.allergens) if(active.has(a)) { blocked=true; break; }
            const matchSearch = !searchVal || dish.name.includes(searchVal) || dish.restaurant.includes(searchVal);
            const hide = blocked || !matchSearch;
            if(hide) card.classList.add('hidden');
            else { card.classList.remove('hidden'); visible++; }
        });
        document.getElementById('dishCount').innerText = visible;
        const prefix = t('filterBarPrefix');
        const suffix = t('filterBarSuffix');
        const filterDiv = document.getElementById('filterBar');
        if(active.size > 0) {
            filterDiv.style.display = 'flex';
            document.getElementById('filterBarText').innerText = `${prefix} ${visible} ${suffix}`;
            document.getElementById('filterBadge').style.display = 'inline-block';
        } else {
            filterDiv.style.display = 'none';
            document.getElementById('filterBadge').style.display = 'none';
        }
        if(visible===0) { document.getElementById('emptyState').style.display='block'; document.getElementById('dishList').style.display='none'; }
        else { document.getElementById('emptyState').style.display='none'; document.getElementById('dishList').style.display='flex'; }
    }

    function renderDishes() {
        const container = document.getElementById('dishList');
        container.innerHTML = '';
        dishesData.forEach((dish, idx) => {
            const card = document.createElement('div');
            card.className = 'dish-card';
            card.id = `dish-card-${idx}`;
            const tagsHtml = dish.allergens.map(a => {
                let display = a;
                if(translations[currentLang].subNames[a]) display = translations[currentLang].subNames[a];
                else if(translations[currentLang].masterNames[a]) display = translations[currentLang].masterNames[a];
                return `<span class="allergen-tag">${display}</span>`;
            }).join('');
            card.innerHTML = `<div class="dish-info"><div class="dish-name">${dish.name}</div><div class="dish-restaurant">${dish.restaurant}</div><div class="dish-price">¥${dish.price}</div></div><div class="dish-tags">${tagsHtml}</div>`;
            container.appendChild(card);
        });
        filterDishes();
    }

    function refreshLanguageUI() {
        document.getElementById('mainTitle').innerText = t('mainTitle');
        document.getElementById('subtitle').innerText = t('subtitle');
        document.getElementById('allergenLabel').innerText = t('allergenLabel');
        document.getElementById('searchInput').placeholder = t('searchPlaceholder');
        document.getElementById('countPrefix').innerText = t('countPrefix');
        document.getElementById('countSuffix').innerText = t('countSuffix');
        document.getElementById('emptyTitle').innerText = t('emptyTitle');
        document.getElementById('emptyDesc').innerHTML = t('emptyDesc');
        document.getElementById('footer').innerText = t('footer');
        document.getElementById('loginBtn').innerText = t('loginBtn');
        document.getElementById('shareBtn').title = t('shareTooltip');
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.getElementById('themeToggleBtn').title = isDark ? t('themeTooltipLight') : t('themeTooltipDark');
        document.getElementById('langBtn').title = t('langTooltip');
        renderMasterAndSubs();
        renderDishes();
    }

    // 深色模式
    const themeBtn = document.getElementById('themeToggleBtn');
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');
    function updateThemeButton() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        themeBtn.innerHTML = isDark ? '☀️' : '🌙';
        themeBtn.title = isDark ? t('themeTooltipLight') : t('themeTooltipDark');
    }
    themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if(isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
        else { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
        updateThemeButton();
        refreshLanguageUI();
    });

    // ==================== 分享功能：100% 可靠的手动复制方案 ====================
    const shareBtn = document.getElementById('shareBtn');
    const toast = document.getElementById('toastMsg');

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    shareBtn.addEventListener('click', () => {
        const url = window.location.href;
        
        // 创建一个临时的文本框
        const tempInput = document.createElement('input');
        tempInput.value = url;
        document.body.appendChild(tempInput);
        tempInput.select();
        tempInput.setSelectionRange(0, 99999); // 对移动端兼容
        
        // 获取当前语言的提示文本
        let msg = t('shareSuccess') || '✅ 链接已选中，请按 Ctrl+C (Mac: Cmd+C) 复制';
        alert(msg);
        showToast(msg);
        
        document.body.removeChild(tempInput);
    });

    // 语言菜单
    const langBtnDom = document.getElementById('langBtn'), langMenu = document.getElementById('langMenu');
    langBtnDom.addEventListener('click', (e) => { e.stopPropagation(); langMenu.classList.toggle('show'); });
    document.addEventListener('click', () => langMenu.classList.remove('show'));
    document.querySelectorAll('.lang-item').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            const l = el.dataset.lang;
            if(translations[l]) { currentLang = l; refreshLanguageUI(); updateThemeButton(); }
            langMenu.classList.remove('show');
        });
    });
    document.getElementById('accountBtn').addEventListener('click',()=>alert('个人账号开发中'));
    document.getElementById('loginBtn').addEventListener('click',()=>alert('登录功能开发中'));
    document.getElementById('searchInput').addEventListener('input', () => filterDishes());

    refreshLanguageUI();
    updateThemeButton();
</script>
</body>
</html>
